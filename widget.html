<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break Buddy – Widget</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        button {
            padding: 10px 15px;
            margin: 5px 0;
            border: none;
            border-radius: 6px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        #settingsPanel {
            display: none;
            margin-top: 15px;
        }

        #settingsPanel.open {
            display: block;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        #feed div {
            padding: 6px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

    <div class="section">
        <h2 id="greeting">Hej</h2>
        <p>20–60 sekunders let aktivitet øger energien.</p>

        <button id="activityBtn">Få en aktivitet</button>
        <button id="doneBtn">Jeg er færdig</button>

        <h3>Det gør dine buddies:</h3>
        <div id="feed">Indlæser...</div>

        <button id="settingsBtn" style="margin-top:15px; background:#2196F3;">
            Indstillinger
        </button>

        <div id="settingsPanel">
            <h3>Indstillinger</h3>

            <label>Dit navn</label>
            <input id="nameInput" placeholder="Dit navn">

            <label>Team</label>
            <input id="teamInput" placeholder="Teamnavn">

            <button id="saveBtn" style="background:#FF9800;">Gem</button>
        </div>
    </div>

    <script src="js/widget.js"></script>
</body>
</html>
