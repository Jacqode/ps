<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <title>Break Buddy – Widget</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="css/style.css?v=20260305" />
</head>

<body class="page-widget">
  <div class="app-container">
    <h1 id="greeting">Hej ukendt</h1>
    <p class="intro">20–60 sekunders let aktivitet øger energien.</p>

    <button id="ideaBtn">Få en aktivitet</button>
    <div id="currentIdea" aria-live="polite"></div>

    <button id="doneBtn" style="margin-top:10px">Jeg er færdig</button>
    <div id="microFeedback" aria-live="polite" style="opacity:0;transition:opacity .3s;margin-top:8px;color:green"></div>

    <h2 class="feed-title">Det gør dine buddies:</h2>
    <section id="feed" aria-label="Andres pauser"></section>

    <a class="settings" href="settings.html">Indstillinger</a>
  </div>

  <script src="js/widget.js?v=20260305"></script>
  <script src="js/reminder.js?v=20260305"></script>
</body>
</html>
