<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Plug & Pause</title>

  <style>
    :root {
      --bg:#f4f4f4;
      --card:#fff;
      --accent:#4CAF50;
      --accent-2:#2196F3;
      --muted:#666;
    }

    html,body {
      height:100%;
      margin:0;
      font-family:Inter,Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:#222;
    }

    .wrap {
      max-width:420px;
      margin:18px auto;
      padding:16px;
    }

    .card {
      background:var(--card);
      border-radius:12px;
      padding:16px;
      box-shadow:0 6px 18px rgba(0,0,0,0.06);
    }

    h2 {
      margin:0 0 8px;
      font-size:18px;
    }

    .lead {
      margin:0 0 12px;
      color:var(--muted);
    }

    .controls {
      display:flex;
      gap:8px;
      margin-bottom:12px;
    }

    button {
      flex:1;
      padding:10px 12px;
      border-radius:8px;
      border:0;
      background:var(--accent);
      color:#fff;
      font-weight:600;
      cursor:pointer;
    }

    button.secondary {
      background:#eee;
      color:#222;
    }

    #settingsBtn {
      background:var(--accent-2);
      margin-top:12px;
    }

    #settingsPanel {
      display:none;
      margin-top:12px;
    }

    #settingsPanel.open {
      display:block;
    }

    label {
      display:block;
      font-size:13px;
      margin-top:8px;
      color:var(--muted);
    }

    input {
      width:100%;
      padding:10px;
      border-radius:8px;
      border:1px solid #ddd;
      margin-top:6px;
    }

    #feed {
      margin-top:8px;
      max-height:220px;
      overflow:auto;
    }

    .feed-item {
      padding:8px 0;
      border-bottom:1px solid #f0f0f0;
    }

    .small {
      font-size:13px;
      color:var(--muted);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h2 id="greeting">Hej</h2>
      <p class="lead">20–60 sekunders let aktivitet øger energien.</p>

      <div class="controls">
        <button id="activityBtn">Få en aktivitet</button>
        <button id="doneBtn" class="secondary">Jeg er færdig</button>
      </div>

      <!-- Aktivitet + microfeedback -->
      <div id="currentActivity" class="small" style="margin-top:10px;"></div>
      <div id="microFeedback" class="small" style="margin-top:10px; display:none;"></div>

      <h3>Det gør dine buddies:</h3>
      <div id="feed"><div class="small">Indlæser…</div></div>

      <div id="stats" class="small" style="margin-top:10px">
        Indlæser statistik…
      </div>

      <button id="settingsBtn">Indstillinger</button>

      <div id="settingsPanel" aria-hidden="true">
        <label for="nameInput">Dit navn</label>
        <input id="nameInput" placeholder="Dit navn" />

        <label for="teamInput">Team</label>
        <input id="teamInput" placeholder="Teamnavn" />

        <button id="saveBtn" style="margin-top:10px">Gem</button>
      </div>
    </div>
  </div>

  <script src="js/widget.js"></script>
</body>
</html>
