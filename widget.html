<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Plug & Pause</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    /* Fallback-toast hvis notifications ikke er tilladt */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #222;
      color: #fff;
      padding: 12px 18px;
      border-radius: 6px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 9999;
    }
    #toast.show {
      opacity: 1;
    }
  </style>
</head>

<script src="js/widget.js"></script>
  
<body>
  <div class="wrap">
    <div class="card">
      <h2 id="greeting">Hej</h2>
      <p class="lead">20–60 sekunders let aktivitet øger energien.</p>

      <div class="controls">
        <button id="activityBtn">Få en aktivitet</button>
        <button id="doneBtn" class="secondary">Jeg er færdig</button>
      </div>

      <div id="currentActivity" class="small" style="margin-top:10px;"></div>
      <div id="microFeedback" class="small" style="margin-top:10px; display:none;"></div>

      <h3>Det gør dine buddies:</h3>
      <div id="feed"><div class="small">Indlæser…</div></div>

      <div id="stats" class="small" style="margin-top:10px">
        Indlæser statistik…
      </div>

      <button id="settingsBtn">Indstillinger</button>

      <div id="settingsPanel" aria-hidden="true">
        <label for="nameInput">Dit navn</label>
        <input id="nameInput" placeholder="Dit navn" />

        <label for="teamInput">Team</label>
        <input id="teamInput" placeholder="Teamnavn" />

        <label for="intervalInput">Minutter mellem påmindelser</label>
        <input id="intervalInput" type="number" min="1" placeholder="fx 45" />

        <button id="saveBtn" style="margin-top:10px">Gem</button>

          <!-- Her kommer Stripe-knappen -->
        <a href="https://buy.stripe.com/test_3cIfZhf4b0jL3hX4AZ67S00"
           target="_blank"
           id="upgradeBtn"
           class="secondary"
           style="margin-top:12px; display:block; text-align:center;">
          Opgradér til Pro
        </a>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // --- NOTIFIKATIONER ---

    function requestNotificationPermission() {
      if (!("Notification" in window)) return;
      if (Notification.permission === "default") {
        Notification.requestPermission();
      }
    }

    function showNativeNotification(title, body) {
      if (!("Notification" in window)) return;

      if (Notification.permission === "granted") {
        new Notification(title, {
          body: body,
          icon: "img/icon.png"
        });
      } else {
        showToast(body);
      }
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    }

    // --- GEM / INDLÆS INDSTILLINGER ---

    document.getElementById("saveBtn").addEventListener("click", () => {
      const name = document.getElementById("nameInput").value;
      const team = document.getElementById("teamInput").value;
      const interval = document.getElementById("intervalInput").value;

      localStorage.setItem("userName", name);
      localStorage.setItem("teamName", team);
      localStorage.setItem("reminderInterval", interval);

      showToast("Indstillinger gemt");
    });

    window.addEventListener("load", () => {
      const savedName = localStorage.getItem("userName");
      const savedTeam = localStorage.getItem("teamName");
      const savedInterval = localStorage.getItem("reminderInterval");

      if (savedName) document.getElementById("nameInput").value = savedName;
      if (savedTeam) document.getElementById("teamInput").value = savedTeam;
      if (savedInterval) document.getElementById("intervalInput").value = savedInterval;

      startReminderTimer();
    });

    // --- PÅMINDELSES-TIMER ---

    function startReminderTimer() {
      const minutes = Number(localStorage.getItem("reminderInterval") || 45);

      setTimeout(() => {
        showNativeNotification("Tid til en pause!", "Rejs dig og tag en kort aktivitet.");
        startReminderTimer(); // start igen
      }, minutes * 60 * 1000);
    }

    // --- KNAPPER ---

  document.getElementById("activityBtn").addEventListener("click", () => {
    // Her henter du aktiviteten som normalt via widget.js
    // Ingen notifikation her
    });

  document.getElementById("doneBtn").addEventListener("click", () => {
    // Her håndteres "færdig"-logikken i widget.js
    // Ingen notifikation her
    });

  document.getElementById("doneBtn").addEventListener("click", () => {
    const feedback = document.getElementById("microFeedback");
    feedback.textContent = "Godt klaret! Fortsæt den gode vane 💪";
    feedback.style.display = "block";

    // Skjul igen efter 8 sekunder (valgfrit)
    setTimeout(() => {
      feedback.style.display = "none";
    }, 8000);
});
    
  </script>

  <script src="js/widget.js"></script>
</body>
</html>
