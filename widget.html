<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plug & Pause</title>
    <link rel="stylesheet" href="css/style.css" />

    <style>
        /* Fallback-toast hvis notifications ikke er tilladt */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #222;
            color: #fff;
            padding: 12px 18px;
            border-radius: 6px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 9999;
        }
        #toast.show {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card">
            <h2 id="greeting">Halløj</h2>
            <p class="lead-20">20-60 sekunders let aktivitet øger energien.</p>

            <div class="controls">
                <button id="activityBtn">Få en aktivitet</button>
                <button id="doneBtn" class="secondary">Jeg er færdig</button>
            </div>

            <h3>Det gør dine buddies:</h3>
            <div id="currentActivity" class="small" style="margin-top:10px"></div>
            <div id="microfeedback" class="small" style="margin-top:10px"></div>
            <div id="feed" class="small">Indlæser...</div>
            <div id="stats" class="small" style="margin-top:10px">Indlæser statistik...</div>

            <div id="settingsBtn">Indstillinger</div>
            <div id="settingsPanel" aria-hidden="true">
                <label for="nameInput">Dit NAVN</label>
                <input id="nameInput" placeholder="Dit navn" />

                <label for="teamInput">Teamnavn</label>
                <input id="teamInput" placeholder="Teamnavn" />

                <button id="saveBtn" style="margin-top:10px">Gem</button>
            </div>
        </div>
    </div>

    <!-- Fallback toast -->
    <div id="toast"></div>

    <script>
        // --- NOTIFIKATIONER (NY VERSION) ---

        function requestNotificationPermission() {
            if (!("Notification" in window)) return;

            if (Notification.permission === "default") {
                Notification.requestPermission();
            }
        }

        function showNativeNotification(title, body) {
            if (!("Notification" in window)) return;

            if (Notification.permission === "granted") {
                new Notification(title, {
                    body: body,
                    icon: "img/icon.png"
                });
            } else {
                showToast(body);
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.add("show");

            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }

        // Eksempel: kald når brugeren får en aktivitet
        document.getElementById("activityBtn").addEventListener("click", () => {
            showNativeNotification("Tid til en pause!", "Her er en aktivitet til dig.");
        });

        // Eksempel: kald når brugeren er færdig
        document.getElementById("doneBtn").addEventListener("click", () => {
            showNativeNotification("Godt gået!", "Du har gennemført din pause.");
        });

        // Bed om tilladelse ved load
        requestNotificationPermission();
    </script>
</body>
</html>
