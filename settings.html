<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <title>Indstillinger</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; margin:20px; max-width:720px; color:#111; }
    label { display:block; margin-top:20px; font-size:16px; }
    input { padding:10px; width:100%; margin-top:6px; font-size:16px; }
    button { margin-top:20px; padding:10px 14px; font-size:16px; border:none; border-radius:8px; background:#0078d4; color:#fff; cursor:pointer; }
    a.back { display:block; margin-top:20px; text-decoration:underline; color:inherit; font-size:14px; }
  </style>
</head>
<body>

  <h1>Indstillinger</h1>

  <label for="nameInput">Dit navn</label>
  <input id="nameInput" type="text" placeholder="Skriv dit navn" />

  <label for="intervalInput">Påmindelsesinterval (minutter)</label>
  <input id="intervalInput" type="number" min="1" max="180" />

  <button id="saveBtn">Gem</button>

  <a class="back" href="FirmaJ.html">Tilbage</a>

  <script>
    const nameInput = document.getElementById("nameInput");
    const intervalInput = document.getElementById("intervalInput");
    const saveBtn = document.getElementById("saveBtn");

    nameInput.value = localStorage.getItem("userName") || "";
    intervalInput.value = localStorage.getItem("pp_interval_min") || 40;

    saveBtn.addEventListener("click", () => {
      localStorage.setItem("userName", nameInput.value.trim());
      localStorage.setItem("pp_interval_min", intervalInput.value);
      window.location.href = "FirmaJ.html";
    });
  </script>

</body>
</html>
