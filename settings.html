<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <title>Indstillinger</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app-container {
      background: #ffffff;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 20px;
      font-size: 16px;
      text-align: left;
    }

    input {
      padding: 10px;
      width: 100%;
      margin-top: 6px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 24px;
      padding: 12px;
      width: 100%;
      font-size: 17px;
      border: none;
      border-radius: 10px;
      background: #0078d4;
      color: #fff;
      cursor: pointer;
    }

    a.back {
      display: block;
      margin-top: 20px;
      text-decoration: underline;
      color: #333;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="app-container">
    <h1>Indstillinger</h1>

    <label for="nameInput">Dit navn</label>
    <input id="nameInput" type="text" placeholder="Skriv dit navn" />

    <label for="intervalInput">Påmindelsesinterval (minutter)</label>
    <input id="intervalInput" type="number" min="1" max="180" />

    <button id="saveBtn">Gem</button>

    <a class="back" href="FirmaJ.html">Tilbage</a>
  </div>

  <script>
    const nameInput = document.getElementById("nameInput");
    const intervalInput = document.getElementById("intervalInput");
    const saveBtn = document.getElementById("saveBtn");

    nameInput.value = localStorage.getItem("userName") || "";
    intervalInput.value = localStorage.getItem("pp_interval_min") || 40;

    saveBtn.addEventListener("click", () => {
      localStorage.setItem("userName", nameInput.value.trim());
      localStorage.setItem("pp_interval_min", intervalInput.value);
      window.location.href = "FirmaJ.html";
    });
  </script>
</body>
</html>
