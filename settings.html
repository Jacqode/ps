<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="utf-8" />
    <title>Plug & Pause – Indstillinger</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="/ps/css/style.css" />
</head>

<body class="page-settings">
    <div class="app-container">

        <h1>Indstillinger</h1>

        <p class="intro">
            Tilpas dit navn og hvor ofte du vil mindes om en pause.
        </p>

        <!-- Navn -->
        <section>
            <h2>Dit navn</h2>
            <label for="userName">Navn:</label>
            <input id="userName" type="text" placeholder="Skriv dit navn" />

            <button id="saveName">Gem navn</button>
            <div id="nameFeedback" aria-live="polite"></div>
        </section>

        <!-- Påmindelses-interval -->
        <section style="margin-top: 30px;">
            <h2>Påmindelses-interval</h2>
            <label for="reminderMinutes">Antal minutter mellem påmindelser:</label>
            <input id="reminderMinutes" type="number" min="1" placeholder="fx 30" />

            <button id="saveInterval">Gem interval</button>
            <div id="intervalFeedback" aria-live="polite"></div>
        </section>

        <!-- Navigation -->
        <a class="back" href="widget.html">← Tilbage til widget</a>
    </div>

    <script>
        // Hent gemt navn
        const nameInput = document.getElementById("userName");
        const savedName = localStorage.getItem("userName");
        if (savedName) nameInput.value = savedName;

        // Gem navn
        document.getElementById("saveName").addEventListener("click", () => {
            const name = nameInput.value.trim();
            if (!name) return;

            localStorage.setItem("userName", name);

            const fb = document.getElementById("nameFeedback");
            fb.textContent = "Navn gemt ✔️";
            fb.style.opacity = 1;
            setTimeout(() => fb.style.opacity = 0, 1500);
        });

        // Hent gemt interval
        const intervalInput = document.getElementById("reminderMinutes");
        const savedInterval = localStorage.getItem("reminderInterval");
        if (savedInterval) intervalInput.value = savedInterval;

        // Gem interval
        document.getElementById("saveInterval").addEventListener("click", () => {
            const minutes = intervalInput.value.trim();
            if (!minutes || isNaN(minutes) || minutes <= 0) return;

            localStorage.setItem("reminderInterval", minutes);

            const fb = document.getElementById("intervalFeedback");
            fb.textContent = "Interval gemt ✔️";
            fb.style.opacity = 1;
            setTimeout(() => fb.style.opacity = 0, 1500);
        });
    </script>
</body>
</html>
