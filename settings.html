<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <title>Break Buddy – Indstillinger</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="css/style.css?v=20260305" />
</head>

<body class="page-settings">
  <div class="app-container">
    <h1>Indstillinger</h1>
    <p class="intro">Tilpas navn, team og interval.</p>

    <form id="settingsForm" onsubmit="return false;">
      <div>
        <label for="userName">Dit navn</label>
        <input id="userName" type="text" placeholder="F.eks. Jakob" />
      </div>

      <div>
        <label for="teamName">Team / Gruppe</label>
        <input id="teamName" type="text" placeholder="F.eks. Sundhed" />
      </div>

      <div>
        <label for="reminderInterval">Interval (min)</label>
        <input id="reminderInterval" type="number" min="1" max="240" />
      </div>

      <div class="controls">
        <button id="saveBtn" type="button">Gem</button>
        <button id="resetBtn" class="secondary" type="button">Nulstil</button>
      </div>

      <p class="note">Ændringer gemmes lokalt i din browser.</p>
    </form>

    <a class="settings" href="widget.html">Tilbage til widget</a>
  </div>

  <script>
    const nameInput = document.getElementById('userName');
    const teamInput = document.getElementById('teamName');
    const intervalInput = document.getElementById('reminderInterval');
    const saveBtn = document.getElementById('saveBtn');
    const resetBtn = document.getElementById('resetBtn');

    function loadSettings() {
      nameInput.value = localStorage.getItem('userName') || '';
      teamInput.value = localStorage.getItem('teamName') || '';
      intervalInput.value = localStorage.getItem('reminderInterval') || '';
    }

    function saveSettings() {
      if (nameInput.value.trim()) localStorage.setItem('userName', nameInput.value.trim());
      if (teamInput.value.trim()) localStorage.setItem('teamName', teamInput.value.trim());
      if (intervalInput.value.trim()) localStorage.setItem('reminderInterval', intervalInput.value.trim());

      saveBtn.textContent = 'Gemmet ✓';
      setTimeout(() => saveBtn.textContent = 'Gem', 1200);
    }

    function resetSettings() {
      localStorage.removeItem('userName');
      localStorage.removeItem('teamName');
      localStorage.removeItem('reminderInterval');
      loadSettings();
      resetBtn.textContent = 'Nulstil ✓';
      setTimeout(() => resetBtn.textContent = 'Nulstil', 1200);
    }

    saveBtn.addEventListener('click', saveSettings);
    resetBtn.addEventListener('click', resetSettings);

    loadSettings();
  </script>
</body>
</html>
