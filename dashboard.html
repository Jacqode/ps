<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plug & Pause – Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1, h2, h3, h4 {
            margin-bottom: 10px;
        }

        .section {
            background: white;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .member-item, .feed-item {
            padding: 6px 0;
            border-bottom: 1px solid #eee;
        }

        canvas {
            margin-top: 20px;
            background: #fff;
            border-radius: 8px;
            padding: 10px;
        }
    </style>
</head>

<body>

    <h1>Plug & Pause – Team Dashboard</h1>

    <!-- Team Members -->
    <div class="section">
        <h2>Team medlemmer</h2>
        <div id="teamMembers">Indlæser...</div>
    </div>

    <!-- Team Feed -->
    <div class="section">
        <h2>Seneste aktivitet</h2>
        <div id="teamFeed">Indlæser...</div>
    </div>

    <!-- Team Stats -->
    <div class="section">
        <h2>Statistik</h2>
        <div id="teamStats">Indlæser...</div>
    </div>

    <!-- Charts -->
    <div class="section">
        <h2>Grafer</h2>

        <h3>Aktivitet pr. medlem</h3>
        <canvas id="userChart" width="400" height="200"></canvas>

        <h3>Aktivitet pr. dag (seneste 7 dage)</h3>
        <canvas id="dayChart" width="400" height="200"></canvas>
    </div>

    <!-- Dashboard Logic -->
    <script src="js/dashboard.js"></script>

</body>
</html>
